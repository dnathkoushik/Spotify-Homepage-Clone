<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <link rel="stylesheet" href="style.css" />
    <title>Music Player - Web Experience</title>
    <link rel="icon" href="./assets/logo.png" />
</head>

<body>

    <div class="layout">

        <!-- ================= SIDEBAR ================= -->
        <aside class="sidebar">

            <!-- Navigation -->
            <nav class="nav-section">
                <ul>
                    <li id="nav-home"><i class="fa-solid fa-house"></i> Home</li>
                    <li id="nav-search"><i class="fa-solid fa-magnifying-glass"></i> Search</li>
                </ul>
            </nav>

            <!-- Library -->
            <section class="library-section">

                <div class="library-header">
                    <div class="library-title">
                        <img src="./assets/library_icon.png" alt="Library" />
                        <span>Your Library</span>
                    </div>
                    <div class="library-actions">
                        <i class="fa-solid fa-plus" id="add-playlist"></i>
                        <i class="fa-solid fa-arrow-right"></i>
                    </div>
                </div>

                <div class="library-content">

                    <!-- Create Playlist Card -->
                    <div class="library-card">
                        <p class="card-heading">Create your first playlist</p>
                        <p class="card-subtext">We’ll guide you step by step</p>
                        <button id="create-playlist">Create Playlist</button>
                    </div>

                    <!-- Podcast Card -->
                    <div class="library-card">
                        <p class="card-heading">Follow your favorite podcasts</p>
                        <p class="card-subtext">Stay updated with new episodes</p>
                        <button>Browse Podcasts</button>
                    </div>

                    <!-- Liked Songs -->
                    <div id="liked-tracks" class="playlist-shortcut">
                        <div class="icon-box">
                            <i class="fa-solid fa-heart"></i>
                        </div>
                        <div>
                            <p class="playlist-name">Liked Songs</p>
                            <p id="liked-count">0 tracks</p>
                        </div>
                    </div>

                    <!-- Dynamic Playlist Container -->
                    <div id="user-playlists"></div>

                </div>
            </section>

        </aside>

        <!-- ================= MAIN CONTENT ================= -->
        <main class="main-area">

            <!-- Top Bar -->
            <header class="topbar">
                <div class="navigation-arrows">
                    <img src="./assets/backward_icon.png" alt="Back">
                    <img src="./assets/forward_icon.png" alt="Forward">
                </div>

                <div class="user-actions">
                    <button class="btn-premium">Explore Premium</button>
                    <button class="btn-install">
                        <i class="fa-solid fa-circle-arrow-down"></i> Install App
                    </button>
                    <button class="icon-btn"><i class="fa-regular fa-bell"></i></button>
                    <button class="icon-btn"><i class="fa-regular fa-user"></i></button>
                </div>
            </header>

            <!-- Content Area -->
            <section class="content-area">

                <div id="search-section" style="display: none;"></div>

                <div id="home-section">

                    <div class="music-category">
                        <h2>Trending Now</h2>
                        <div class="card-wrapper"></div>
                    </div>

                    <div class="music-category">
                        <h2>Top Mixes</h2>
                        <div class="card-wrapper"></div>
                    </div>

                </div>

            </section>

            <!-- Playlist Modal -->
            <div id="playlist-popup" class="modal">
                <div class="modal-body">
                    <span class="modal-close">&times;</span>
                    <h3>Select Playlist</h3>
                    <div id="playlist-options"></div>
                </div>
            </div>

            <footer class="footer-space"></footer>

        </main>

        <!-- ================= MUSIC PLAYER ================= -->
        <footer class="music-player">

            <!-- Current Song -->
            <div class="current-track">
                <img src="./assets/card2img.jpeg" alt="Song Image">

                <div class="track-info">
                    <p class="track-title">Mahiye Jinna Sohna</p>
                    <p class="track-desc">An Emotional Track</p>
                </div>

                <i class="fa-solid fa-circle-plus" id="add-to-playlist"></i>
                <i class="fa-regular fa-heart" id="like-track"></i>
            </div>

            <!-- Controls -->
            <div class="player-controls">

                <div class="control-icons">
                    <i class="fa-solid fa-backward-step"></i>
                    <i class="fa-solid fa-play"></i>
                    <i class="fa-solid fa-forward-step"></i>
                </div>

                <div class="progress-bar">
                    <span>0:00</span>
                    <input type="range" min="0" max="100">
                    <span>3:34</span>
                </div>

            </div>

            <!-- Extra Options -->
            <div class="player-options">
                <i class="fa-solid fa-list" id="queue-toggle"></i>
                <i class="fa-solid fa-volume-low"></i>
                <input type="range" min="0" max="15">
            </div>

        </footer>

    </div>

    <!-- Hidden YouTube Player -->
    <div id="yt-container" style="display:none;"></div>

    <!-- Queue Panel -->
    <div id="queue-drawer" class="queue-drawer">
        <div class="queue-header">
            <h3>Now Playing</h3>
            <button id="close-queue"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="queue-items"></div>
    </div>

    <div id="overlay"></div>

    <!-- Toast Container -->
    <div id="toast-box"></div>

    <script src="script.js"></script>

</body>
</html>
